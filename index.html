<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pitut Labs Support</title>
  <meta name="description" content="Support pages for Pitut Labs apps.">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f4ef;
      --panel: #ffffff;
      --text: #172033;
      --muted: #5d6678;
      --accent: #2c6fb7;
      --border: #dfd7ca;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #101827;
        --panel: #182338;
        --text: #f6f1e8;
        --muted: #bec7d6;
        --accent: #83baf4;
        --border: #2d3b55;
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.55;
    }

    main {
      width: min(760px, calc(100% - 32px));
      margin: 0 auto;
      padding: 56px 0;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 32px;
      box-shadow: 0 12px 32px rgba(23, 32, 51, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1.05;
    }

    h2 {
      margin: 32px 0 8px;
      font-size: 1.25rem;
    }

    p {
      margin: 0 0 16px;
    }

    ul {
      margin: 8px 0 0;
      padding-left: 22px;
    }

    li {
      margin: 6px 0;
    }

    a {
      color: var(--accent);
      font-weight: 650;
    }

    .muted {
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main>
    <section class="panel" aria-labelledby="support-title">
      <p class="muted">Pitut Labs</p>
      <h1 id="support-title">Support</h1>
      <p>
        For help, subscription questions, bug reports, or feedback about Pitut Labs apps, contact us at
        <a href="mailto:support@pitutlabs.com">support@pitutlabs.com</a>.
      </p>
      <p class="muted">
        We usually respond within 2 business days.
      </p>

      <h2>Apps</h2>
      <ul>
        <li><a href="./digigit-nyamuk/">Digigit Nyamuk Support</a></li>
      </ul>
    </section>
  </main>
</body>
</html>
